<header class="app-header" *ngIf="currentUser">
  <!-- Left: Burger Menu Button -->
  <button class="burger-btn" (click)="toggleSidebar()" [class.open]="isOpen">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <!-- Center: Brand/Title -->
  <div class="header-brand">
    <h1>TNS <span>Leave</span> Management</h1>
  </div>

  <!-- Right: User Info & Logout -->
  <div class="header-actions">
    <div class="user-info">
      <div class="user-avatar">{{ displayName.charAt(0).toUpperCase() }}</div>
      <div class="user-details">
        <div class="user-name">{{ displayName }}</div>
        <div class="user-role">{{ roleLabel }}</div>
      </div>
    </div>
    <button class="btn-logout" (click)="logout()" title="Logout">
      <span class="logout-icon">➜]</span>
      <span class="logout-text">Logout</span>
    </button>
  </div>
</header>
