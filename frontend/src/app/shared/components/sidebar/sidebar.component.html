<nav class="sidebar">
  <ul class="nav-list">
    <li *ngFor="let item of visibleItems" class="nav-item">
      <a
        [routerLink]="item.route"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: item.route === '/leave' }"
        class="nav-link"
      >
        <span class="nav-icon">{{ item.icon }}</span>
        <span class="nav-label">{{ item.label }}</span>
      </a>
    </li>
  </ul>
</nav>
