server:
  port: ${SERVER_PORT:8080}
  tomcat:
    connection-timeout: 20000
    threads:
      max: 50
      min-spare: 5

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://fileracks-pg-db.tnssinc.com:5432/postgres}
    username: ${DB_USERNAME:surya}
    password: ${DB_PASSWORD:SpTnS@12345}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 3
      minimum-idle: 1
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-test-query: SELECT 1
      keepalive-time: 60000

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
    open-in-view: false

  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          starttls:
            enabled: true

app:
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-here-change-in-production}
    expiration: ${JWT_EXPIRATION:1800000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://tns-leave-application-alb-1905426526.us-west-2.elb.amazonaws.com,http://tns-leave-application-alb-1905426526.us-west-2.elb.amazonaws.com:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    db:
      enabled: false
    defaults:
      enabled: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

logging:
  level:
    com.tns: INFO
    org.hibernate.SQL: WARN
