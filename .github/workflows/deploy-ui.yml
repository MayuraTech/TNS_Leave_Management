name: Deploy UI

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'

jobs:

  deploy-qa:
    name: Deploy UI to QA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        env:
          ECR_URI: ${{ secrets.ECR_URI_QA_UI }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_URI:$IMAGE_TAG ./frontend
          docker push $ECR_URI:$IMAGE_TAG
          docker tag $ECR_URI:$IMAGE_TAG $ECR_URI:latest
          docker push $ECR_URI:latest

      - name: Update ECS task definition
        id: update-task-def
        env:
          ECR_URI: ${{ secrets.ECR_URI_QA_UI }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          TASK_FAMILY="tns-leave-application-qa-ui"
          TASK_DEF=$(aws ecs describe-task-definition --task-definition $TASK_FAMILY --region us-west-2)
          NEW_TASK_DEF=$(echo $TASK_DEF | jq --arg IMAGE "$ECR_URI:$IMAGE_TAG" '.taskDefinition | .containerDefinitions[0].image = $IMAGE | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')
          NEW_TASK_INFO=$(aws ecs register-task-definition --region us-west-2 --cli-input-json "$NEW_TASK_DEF")
          NEW_REVISION=$(echo $NEW_TASK_INFO | jq -r '.taskDefinition.revision')
          echo "revision=$NEW_REVISION" >> $GITHUB_OUTPUT

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster tns-leave-application-cluster \
            --service tns-leave-application-qa-ui \
            --task-definition tns-leave-application-qa-ui:${{ steps.update-task-def.outputs.revision }} \
            --region us-west-2

      - name: Wait for deployment to complete
        run: |
          aws ecs wait services-stable \
            --cluster tns-leave-application-cluster \
            --services tns-leave-application-qa-ui \
            --region us-west-2
